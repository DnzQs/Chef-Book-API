version: '3.8'

services:
  db:

    image: postgres:15-alpine
    container_name: chef_book_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Chef_book_api_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Chef_book_api_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  web:
    build: .
    container_name: chef_book_api_container
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: